name: Homepage screenshot
on:
  schedule: [{cron: "30 */12 * * *"}]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: homepage-screenshot
  cancel-in-progress: false
jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install CJK fonts + puppeteer-core
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk
          npm --prefix .github/scripts install
      - name: Capture full-page homepage (desktop 1280 @2x)
        run: SHOT_OUT="$PWD/homepage.png" CHROME_PATH="$(which google-chrome)" node .github/scripts/screenshot.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain homepage.png)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add homepage.png
            git commit -m "Update homepage.png [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push && exit 0
              sleep 5
            done
            echo "push failed after retries" >&2; exit 1
          else
            echo "homepage.png unchanged"
          fi
